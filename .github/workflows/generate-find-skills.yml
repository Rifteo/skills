name: Generate find-skills

on:
  push:
    branches: [main]
    paths:
      - '*/SKILL.md'
      - '.github/scripts/generate-find-skills.mjs'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate find-skills/SKILL.md
        run: node .github/scripts/generate-find-skills.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f find-skills/SKILL.md
          git diff --cached --quiet || git commit -m "chore: regenerate find-skills [skip ci]"
          git push
